<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spiller Profile | Tea House</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body.profile-page { background: #0a0a0c; color: #fff; font-family: 'Inter', sans-serif; margin: 0; min-height: 100vh; }
        .profile-header { text-align: center; padding: 60px 20px 30px; position: relative; border-bottom: 1px solid rgba(255,255,255,0.05); background: #111116; }
        .profile-name { font-size: 2.2rem; font-family: 'Oswald', sans-serif; margin: 0 0 5px 0; color: #fff; text-transform: uppercase; }
        .profile-tagline { color: var(--gold); font-size: 0.85rem; font-weight: 600; letter-spacing: 1px; margin-top: 0; margin-bottom: 20px; text-transform: uppercase; }
        
        .profile-pic { width: 120px; height: 120px; border-radius: 50%; background: #111116; border: 2px solid rgba(255,255,255,0.1); display: flex; justify-content: center; align-items: center; overflow: hidden; margin: 0 auto 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .profile-pic img { width: 100%; height: 100%; object-fit: cover; }
        .profile-pic i { font-size: 2rem; color: #555; }

        .bio-section { max-width: 400px; margin: 0 auto 25px; text-align: center; }
        .bio-text { color: #aaa; font-size: 0.95rem; line-height: 1.5; margin-bottom: 15px; white-space: pre-wrap; }
        
        .social-links-container { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .social-badge { display: inline-flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.03); padding: 8px 15px; border-radius: 20px; color: #ddd; text-decoration: none; font-size: 0.85rem; border: 1px solid rgba(255,255,255,0.08); transition: 0.2s; font-weight: 500; }
        .social-badge:hover { background: rgba(255,255,255,0.08); color: #fff; transform: translateY(-2px); }

        .follow-btn { background: var(--neon-blue); color: white; border: none; padding: 12px 35px; border-radius: 25px; font-family: 'Oswald', sans-serif; font-size: 1rem; font-weight: bold; letter-spacing: 1px; cursor: pointer; transition: 0.3s; margin-bottom: 10px; }
        .follow-btn:hover { transform: scale(1.05); box-shadow: 0 0 15px rgba(77, 148, 255, 0.4); }
        .follow-btn.following { background: rgba(255,255,255,0.1); color: #aaa; }

        .profile-stats { display: flex; justify-content: center; gap: 40px; margin-top: 30px; }
        .stat { display: flex; flex-direction: column; align-items: center; }
        .stat span { font-size: 1.6rem; font-weight: 700; color: #fff; font-family: 'Oswald', sans-serif; }
        .stat label { font-size: 0.7rem; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-top: 5px; font-weight: 600; }

        .profile-feed { max-width: 600px; margin: 30px auto; padding: 0 20px 100px; }
        .feed-title { font-family: 'Oswald', sans-serif; font-size: 1.2rem; color: #888; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 10px; margin-bottom: 20px; text-transform: uppercase; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #0a0a0c; border-top: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-around; align-items: center; padding: 10px 0; z-index: 100; padding-bottom: calc(10px + env(safe-area-inset-bottom)); }
        .nav-item { color: #666; text-decoration: none; display: flex; flex-direction: column; align-items: center; gap: 5px; font-size: 0.75rem; font-weight: 500; transition: 0.2s; }
        .nav-item.active, .nav-item:hover { color: var(--neon-blue); }
        .nav-item i { font-size: 1.2rem; }
        .spill-btn-container { transform: translateY(-20px); }
        .spill-btn { width: 55px; height: 55px; border-radius: 50%; background: linear-gradient(135deg, var(--neon-pink), var(--neon-blue)); display: flex; justify-content: center; align-items: center; font-size: 1.5rem; color: #fff; box-shadow: 0 5px 20px rgba(255, 77, 148, 0.4); transition: 0.3s; }
    </style>
</head>
<body class="profile-page">

    <header class="profile-header">
        <div class="profile-pic" id="public-pic-display"><i class="fas fa-user"></i></div>
        <h1 class="profile-name" id="public-name">Loading...</h1>
        <p class="profile-tagline" id="public-rank">Spiller</p>

        <button id="follow-btn" class="follow-btn" style="display:none;">FOLLOW</button>

        <div class="bio-section">
            <p id="public-bio" class="bio-text"></p>
            <div class="social-links-container" id="public-socials"></div>
        </div>

        <section class="profile-stats">
            <div class="stat"><span id="stat-followers">-</span><label>FOLLOWERS</label></div>
            <div class="stat"><span id="stat-teas">-</span><label>TEA'S</label></div>
            <div class="stat"><span id="stat-likes">-</span><label>LIKES</label></div>
        </section>
    </header>

    <main class="profile-feed">
        <div class="feed-title">Recent Activity</div>
        <div id="public-tea-feed">
            <p style="text-align: center; color: #666;">Fetching tea... ☕</p>
        </div>
    </main>

    <nav class="bottom-nav">
        <a href="lounge.html" class="nav-item"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="leaderboard.html" class="nav-item"><i class="fas fa-trophy"></i><span>Board</span></a>
        <a href="post-tea.html" class="nav-item spill-btn-container"><div class="spill-btn"><i class="fas fa-plus"></i></div></a>
        <a href="help.html" class="nav-item"><i class="fas fa-book"></i><span>Help</span></a>
        <a href="profile.html" class="nav-item"><i class="fas fa-user"></i><span>Profile</span></a>
    </nav>

    <script type="module" src="js/app.js"></script>
</body>
</html>
