<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notice Board | Tea House</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #0a0a0c; color: white; font-family: 'Inter', sans-serif; margin: 0; padding-bottom: 100px; }
        .page-header { text-align: center; padding: 40px 20px 20px; position: relative; border-bottom: 1px solid rgba(255,255,255,0.05); background: #111116; }
        .page-header h1 { font-family: 'Oswald', sans-serif; font-size: 2.2rem; margin: 0; color: var(--neon-pink); text-transform: uppercase; letter-spacing: 1px; }
        .back-btn { position: absolute; top: 20px; left: 20px; color: white; font-size: 1.5rem; text-decoration: none; background: rgba(255,255,255,0.1); padding: 10px 15px; border-radius: 50%; transition: 0.3s; }
        .back-btn:hover { background: var(--neon-pink); }

        .notice-feed { max-width: 600px; margin: 30px auto; padding: 0 20px; }
        .notice-card { background: rgba(255,77,148,0.05); border-left: 4px solid var(--neon-pink); border-radius: 12px; padding: 25px; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .notice-card p { margin: 0; font-size: 1.05rem; line-height: 1.6; color: #eee; }
        .notice-date { font-size: 0.8rem; color: #888; margin-top: 15px; display: block; font-family: 'Oswald', sans-serif; letter-spacing: 1px; }
    </style>
</head>
<body>

    <header class="page-header">
        <a href="lounge.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <h1><i class="fas fa-bullhorn"></i> Official Notices</h1>
        <p style="color: #888; font-size: 0.9rem; margin-top: 5px;">Announcements from the Founder.</p>
    </header>

    <main class="notice-feed" id="notice-page-feed">
        <p style="text-align: center; color: #888; margin-top: 50px;">Loading announcements... 📢</p>
    </main>

    <script type="module" src="js/app.js"></script>
</body>
</html>
