<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tea House | Full Story</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="tea-view-page">
    <header class="main-header">
        <a href="lounge.html" class="back-btn" style="text-decoration:none; color:white; position:absolute; left:20px;">
            <i class="fas fa-arrow-left"></i> BACK
        </a>
        <h1>FULL TEA ☕</h1>
    </header>

    <main class="post-container">
        <div id="full-tea-display">
            <p style="text-align: center; color: var(--neon-blue);">Pouring the tea...</p>
        </div>
    </main>

    <div id="image-modal" onclick="closeFullscreenImage()" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 999999; justify-content: center; align-items: center; backdrop-filter: blur(5px);">
        <span style="position: absolute; top: 20px; right: 30px; color: white; font-size: 40px; font-weight: bold; cursor: pointer;">&times;</span>
        <img id="modal-image-content" onclick="event.stopPropagation()" style="max-width: 90%; max-height: 90%; border-radius: 10px; box-shadow: 0 0 30px rgba(0,0,0,0.8);">
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
