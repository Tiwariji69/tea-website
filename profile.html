<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | Tea House</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Matte Profile UI Reset */
        body.profile-page { background: #0a0a0c; color: #fff; font-family: 'Inter', sans-serif; margin: 0; min-height: 100vh; }
        
        .profile-header { text-align: center; padding: 60px 20px 30px; position: relative; border-bottom: 1px solid rgba(255,255,255,0.05); background: #111116; }

        .logout-top { position: absolute; top: 20px; right: 20px; background: rgba(255,50,50,0.1); color: #ff4d4d; border: 1px solid rgba(255,50,50,0.2); padding: 8px 15px; border-radius: 8px; cursor: pointer; font-family: 'Oswald', sans-serif; transition: 0.2s; font-weight: 600; letter-spacing: 1px; }
        .logout-top:hover { background: rgba(255,50,50,0.2); }

        .profile-name-container { display: flex; justify-content: center; align-items: center; gap: 10px; margin-bottom: 5px; }
        .profile-name { font-size: 2.2rem; font-family: 'Oswald', sans-serif; margin: 0; color: #fff; letter-spacing: 1px; text-shadow: none; text-transform: uppercase; }
        
        .edit-name-btn { background: none; border: none; color: #666; cursor: pointer; font-size: 1rem; transition: 0.2s; padding: 5px; }
        .edit-name-btn:hover { color: #fff; }

        .profile-tagline { color: var(--gold); font-size: 0.85rem; font-weight: 600; letter-spacing: 1px; margin-top: 0; margin-bottom: 25px; text-transform: uppercase; }

        /* PFP */
        .profile-pic-container { display: inline-block; position: relative; cursor: pointer; margin-bottom: 20px; background: transparent !important; padding: 0 !important; border: none !important; box-shadow: none !important; }
        .profile-pic::before, .profile-pic::after, .profile-pic-container::before, .profile-pic-container::after { display: none !important; }
        
        .profile-pic { width: 120px; height: 120px; border-radius: 50%; background: #111116 !important; padding: 0 !important; border: 2px solid rgba(255,255,255,0.1) !important; display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative; transition: 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.5) !important; }
        .profile-pic:hover { border-color: var(--neon-blue) !important; }
        .profile-pic i { font-size: 2rem; color: #555; position: absolute; z-index: 1; transition: 0.3s; }
        .profile-pic:hover i { color: #fff; }
        #profile-pic-display img { position: relative; z-index: 2; width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

        /* 🚨 THE BIO FIX: Clamped lines so it can't stretch infinitely! 🚨 */
        .bio-section { max-width: 400px; margin: 0 auto 25px; text-align: center; }
        
        .bio-text { 
            color: #aaa; font-size: 0.95rem; line-height: 1.5; margin-bottom: 5px; font-weight: 400; white-space: pre-wrap;
            /* The Clamp Magic */
            display: -webkit-box;
            -webkit-line-clamp: 3; /* Limits to exactly 3 lines */
            line-clamp: 3; /* Standard property for compatibility */
            -webkit-box-orient: vertical;
            overflow: hidden;
            transition: 0.3s ease;
        }
        .bio-text.expanded {
            display: block; /* Removes the limit when clicked */
            -webkit-line-clamp: unset;
            line-clamp: unset;
        }
        
        .read-more-btn { background: none; border: none; color: var(--neon-blue); cursor: pointer; font-size: 0.85rem; font-weight: 600; margin-bottom: 15px; padding: 0; display: none; }
        .read-more-btn:hover { text-decoration: underline; }
        
        /* Multiple Social Links Container */
        .social-links-container { display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        .social-badge { display: inline-flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.03); padding: 8px 15px; border-radius: 20px; color: #ddd; text-decoration: none; font-size: 0.85rem; border: 1px solid rgba(255,255,255,0.08); transition: 0.2s; font-weight: 500; }
        .social-badge:hover { background: rgba(255,255,255,0.08); color: #fff; transform: translateY(-2px); }
        
        .edit-bio-btn { background: none; border: 1px solid rgba(255,255,255,0.1); color: #888; padding: 8px 20px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; transition: 0.2s; font-family: 'Inter', sans-serif; font-weight: 600; margin-top: 10px; }
        .edit-bio-btn:hover { background: rgba(255,255,255,0.05); color: #fff; }

        /* Stats & Tabs */
        .profile-stats { display: flex; justify-content: center; gap: 50px; margin-top: 30px; }
        .stat { display: flex; flex-direction: column; align-items: center; }
        .stat span { font-size: 1.8rem; font-weight: 700; color: #fff; font-family: 'Oswald', sans-serif; text-shadow: none; }
        .stat label { font-size: 0.7rem; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-top: 5px; font-weight: 600; }

        .profile-tabs { display: flex; justify-content: center; border-bottom: 1px solid rgba(255,255,255,0.05); margin-bottom: 20px; background: #0a0a0c; position: sticky; top: 0; z-index: 10; }
        .tab-btn { background: none; border: none; color: #666; font-size: 0.85rem; font-weight: 600; padding: 18px 30px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: 0.2s; border-bottom: 2px solid transparent; }
        .tab-btn:hover { color: #fff; }
        .tab-btn.active { color: var(--neon-blue); border-bottom: 2px solid var(--neon-blue); }

        .profile-feed { max-width: 600px; margin: 0 auto; padding: 20px 20px 100px; }
        
        /* Unified Bottom Nav */
        .bottom-nav { background: #111116; border-top: 1px solid rgba(255,255,255,0.05); z-index: 50; }

        /* The Edit Modal */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 100; justify-content: center; align-items: center; backdrop-filter: blur(8px); }
        .modal-content { background: #111116; border: 1px solid rgba(255,255,255,0.1); width: 90%; max-width: 460px; border-radius: 20px; overflow: hidden; animation: slideUp 0.3s ease-out; box-shadow: 0 15px 50px rgba(0,0,0,0.6); }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .modal-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 30px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .modal-header h2 { margin: 0; font-size: 1.3rem; font-family: 'Oswald', sans-serif; letter-spacing: 1px; color: #fff; }
        .close-modal-btn { background: none; border: none; color: #888; font-size: 1.5rem; cursor: pointer; transition: 0.2s; padding: 5px; }
        .close-modal-btn:hover { color: #ff4d4d; transform: rotate(90deg); }
        
        /* Make modal body scrollable in case they have a small screen */
        .modal-body { padding: 25px 30px; display: flex; flex-direction: column; gap: 20px; max-height: 70vh; overflow-y: auto; }
        .input-wrapper { display: flex; flex-direction: column; gap: 8px; text-align: left; }
        .input-wrapper label { font-size: 0.75rem; color: #aaa; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
        
        .modal-input { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 14px; border-radius: 10px; font-family: 'Inter', sans-serif; font-size: 0.95rem; width: 100%; box-sizing: border-box; transition: 0.2s; }
        .modal-input:focus { outline: none; border-color: var(--neon-blue); background: rgba(255,255,255,0.05); box-shadow: 0 0 15px rgba(77,148,255,0.1); }
        textarea.modal-input { resize: vertical; min-height: 80px; line-height: 1.5; }
        
        .input-group { display: flex; align-items: center; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 0 14px; transition: 0.2s; }
        .input-group:focus-within { border-color: var(--neon-blue); background: rgba(255,255,255,0.05); box-shadow: 0 0 15px rgba(77,148,255,0.1); }
        .input-group span { color: #888; font-weight: bold; font-size: 1rem; }
        .input-group i { color: #888; font-size: 1.1rem; }
        .input-group input { border: none; background: transparent; padding: 14px 10px; flex: 1; color: #fff; font-size: 0.95rem; }
        .input-group input:focus { outline: none; }
        
        .save-profile-btn { background: var(--neon-blue); color: #fff; border: none; padding: 16px; border-radius: 10px; font-family: 'Oswald', sans-serif; font-size: 1.1rem; letter-spacing: 2px; cursor: pointer; transition: 0.3s; margin-top: 5px; width: 100%; font-weight: 600; text-transform: uppercase; flex-shrink: 0;}
        .save-profile-btn:hover { box-shadow: 0 5px 25px rgba(77, 148, 255, 0.4); transform: translateY(-2px); }
    </style>
</head>
<body class="profile-page">

    <style>
        /* ⚙️ 3-DOT MENU STYLES */
        .profile-menu-container { position: absolute; top: 20px; right: 20px; z-index: 100; }
        .three-dot-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; width: 40px; height: 40px; border-radius: 50%; font-size: 1.2rem; cursor: pointer; transition: 0.3s; display: flex; justify-content: center; align-items: center; }
        .three-dot-btn:hover { background: rgba(255,255,255,0.1); box-shadow: 0 0 15px rgba(255,255,255,0.2); }
        
        .profile-dropdown { display: none; position: absolute; top: 50px; right: 0; background: rgba(17, 17, 21, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; width: 200px; box-shadow: 0 15px 40px rgba(0,0,0,0.8); overflow: hidden; animation: dropDownFade 0.2s ease-out; }
        .profile-dropdown.show { display: flex; flex-direction: column; }
        @keyframes dropDownFade { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .dropdown-item { padding: 15px 20px; color: #ccc; text-decoration: none; font-family: 'Oswald', sans-serif; font-size: 0.95rem; font-weight: bold; border-bottom: 1px solid rgba(255,255,255,0.05); text-align: left; display: flex; align-items: center; gap: 10px; cursor: pointer; transition: 0.2s; background: none; width: 100%; border-top: none; border-left: none; border-right: none; }
        .dropdown-item:hover { background: rgba(255,255,255,0.05); color: white; padding-left: 25px; }
        .dropdown-item:last-child { border-bottom: none; }
        
        .item-danger { color: #ff4d4d; }
        .item-danger:hover { background: rgba(255, 77, 77, 0.1); color: #ff4d4d; }
        .item-admin { color: var(--gold); display: none; } /* Hidden by default, JS reveals it */
        .item-admin:hover { background: rgba(255, 188, 76, 0.1); color: var(--gold); }
    </style>

    <header class="profile-header">
        
        <!-- ⚙️ THE NEW 3-DOT MENU -->
        <div class="profile-menu-container">
            <button class="three-dot-btn" onclick="toggleProfileMenu(event)"><i class="fas fa-ellipsis-v"></i></button>
            <div id="profileDropdown" class="profile-dropdown">
                <button class="dropdown-item item-admin" id="dropdown-admin-btn" onclick="window.location.href='admin.html'"><i class="fas fa-crown"></i> Command Center</button>
                <button class="dropdown-item" onclick="logoutUser()"><i class="fas fa-sign-out-alt"></i> Log Out</button>
                <button class="dropdown-item item-danger" onclick="deleteMyAccount()"><i class="fas fa-user-times"></i> Delete Account</button>
            </div>
        </div>
        

        <div class="profile-name-container">
            <h1 class="profile-name">Loading...</h1>
            <button onclick="openEditModal()" class="edit-name-btn"><i class="fas fa-pencil-alt"></i></button>
        </div>
        <p class="profile-tagline">My Tea, My Rules ☕</p>

        <label class="profile-pic-container">
            <div class="profile-pic" id="profile-pic-display">
                <i class="fas fa-camera"></i>
            </div>
            <input type="file" id="avatar-upload" accept="image/*" style="display:none;">
        </label>

        <div class="bio-section">
            <p id="profile-bio-text" class="bio-text">No bio set yet. Spill some tea about yourself.</p>
            <button id="read-more-bio" class="read-more-btn" onclick="toggleBio()">more</button>
            
            <div class="social-links-container" id="social-links-container">
                <a href="#" id="profile-insta-link" class="social-badge" target="_blank" style="display: none;">
                    <i class="fab fa-instagram" style="color: #e1306c; font-size: 1.1rem;"></i> <span id="profile-insta-text"></span>
                </a>
                <a href="#" id="profile-twitter-link" class="social-badge" target="_blank" style="display: none;">
                    <i class="fab fa-x-twitter" style="color: #fff; font-size: 1.1rem;"></i> <span id="profile-twitter-text"></span>
                </a>
                <a href="#" id="profile-discord-link" class="social-badge" target="_blank" style="display: none;">
                    <i class="fab fa-discord" style="color: #5865F2; font-size: 1.1rem;"></i> <span>Join Server</span>
                </a>
            </div>
            
            <button onclick="openEditModal()" class="edit-bio-btn">Edit Profile</button>
        </div>

<section class="profile-stats" style="gap: 25px;">
            <div class="stat" onclick="openFollowList('followers')" style="cursor: pointer; transition: 0.2s;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
                <span id="stat-followers">-</span><label>FOLLOWERS</label>
            </div>
            <div class="stat" onclick="openFollowList('following')" style="cursor: pointer; transition: 0.2s;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
                <span id="stat-following">-</span><label>FOLLOWING</label>
            </div>
            <div class="stat"><span id="stat-teas">-</span><label>TEA'S</label></div>
            <div class="stat"><span id="stat-likes">-</span><label>LIKES</label></div>
        </section>
        
    </header>

    <nav class="profile-tabs">
        <button class="tab-btn active" onclick="switchTab('mine')">YOUR TEA'S</button>
        <button class="tab-btn" onclick="switchTab('favs')">FAVOURITES</button>
        <button class="tab-btn" onclick="switchTab('saved')">SAVED</button>
    </nav>

    <main class="profile-feed" id="my-tea-feed">
        </main>

    <div id="edit-profile-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Edit Profile</h2>
                <button onclick="closeEditModal()" class="close-modal-btn"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                
                <div class="input-wrapper">
                    <label>Spiller Name</label>
                    <input type="text" id="edit-name-input" class="modal-input" placeholder="Your username">
                </div>
                
                <div class="input-wrapper">
                    <label>Bio</label>
                    <textarea id="edit-bio-input" class="modal-input" placeholder="Spill some tea about yourself..."></textarea>
                </div>
                
                <div class="input-wrapper">
                    <label>Instagram Username</label>
                    <div class="input-group">
                        <i class="fab fa-instagram" style="color: #e1306c;"></i>
                        <input type="text" id="edit-insta-input" placeholder="@username">
                    </div>
                </div>

                <div class="input-wrapper">
                    <label>X (Twitter) Username</label>
                    <div class="input-group">
                        <i class="fab fa-x-twitter" style="color: #fff;"></i>
                        <input type="text" id="edit-twitter-input" placeholder="@username">
                    </div>
                </div>

                <div class="input-wrapper">
                    <label>Discord Server Link</label>
                    <div class="input-group">
                        <i class="fab fa-discord" style="color: #5865F2;"></i>
                        <input type="url" id="edit-discord-input" placeholder="https://discord.gg/...">
                    </div>
                </div>
                
                <button onclick="saveProfileData()" class="save-profile-btn" id="save-profile-btn">Save Changes</button>
            </div>
        </div>
    </div>

    <div id="follow-list-modal" class="modal-overlay">
        <div class="modal-content" style="max-width: 400px;">
            <div class="modal-header">
                <h2 id="follow-modal-title">List</h2>
                <button onclick="closeFollowList()" class="close-modal-btn"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body" id="follow-list-content" style="max-height: 50vh; overflow-y: auto; padding: 15px 25px; gap: 10px;">
                </div>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>

    <nav class="bottom-nav">
        <a href="lounge.html" class="nav-item"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="leaderboard.html" class="nav-item"><i class="fas fa-trophy"></i><span>Board</span></a>
        <a href="post-tea.html" class="nav-item spill-btn-container">
            <div class="spill-btn"><i class="fas fa-plus"></i></div>
        </a>
        <a href="help.html" class="nav-item"><i class="fas fa-book"></i><span>Help</span></a>
        <a href="profile.html" class="nav-item active"><i class="fas fa-user"></i><span>Profile</span></a>
    </nav>
</body>
</html>
