<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join the Tea House | Login</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="auth-page">

    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <h1>TEA HOUSE</h1>
                <p>Welcome to the Lounge</p>
            </div>
            
            <h2 id="auth-title">LOGIN NOW !</h2>
           <form id="auth-form">
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="you@example.com" required>
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="••••••••" required minlength="6">
                </div>

                <button type="submit" class="auth-submit">Continue</button>
            </form>

            <div class="divider">OR</div>

            <button onclick="window.loginWithGoogle()" class="google-btn">
                <i class="fab fa-google" style="color: white; font-size: 1.2rem;"></i> Continue with Google
            </button>
            
        <!-- ADD THIS DISCLAIMER -->
            <p style="color: #666; font-size: 0.75rem; margin-top: 20px;">
                By continuing, you agree to our <a href="legal.html" style="color: #888; text-decoration: underline;">Terms of Service & Privacy Policy</a>.
            </p>

            <div class="toggle-text">
                <span id="toggle-auth">New here? Create an account</span>
            </div>
        </div>
    </div>

    <footer class="bottom-nav">
        <a href="lounge.html" class="nav-item"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="leaderboard.html" class="nav-item"><i class="fas fa-trophy"></i><span>Board</span></a>
        <a href="post-tea.html" class="nav-item spill-btn-container">
            <div class="spill-btn"><i class="fas fa-plus"></i></div>
        </a>
        <a href="help.html" class="nav-item"><i class="fas fa-book"></i><span>Help</span></a>
        <a href="auth.html" class="nav-item active"><i class="fas fa-user"></i><span>Profile</span></a>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="js/app.js"></script>

</body>
</html>
